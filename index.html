<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Guess The Song</title>
<style>
body { font-family: Arial; background: #121212; color: white; text-align: center; }
#game { display: none; margin-top: 20px; }
button { padding: 10px 20px; margin: 10px; cursor: pointer; }
input { padding: 10px; width: 250px; }
</style>
</head>

<body>

<h1>🎵 Guess The Song 🎵</h1>

<div id="loginDiv">
  <button id="loginBtn">Login with Spotify</button>
</div>

<div id="game">
  <p>Select a playlist:</p>
  <select id="playlistSelect"></select><br><br>

  <audio id="audio" controls></audio><br><br>

  <input id="guessInput" placeholder="Guess song name">
  <button id="guessBtn">Guess</button>

  <p id="score">Score: 0 | Lives: 3</p>
</div>

<script>

// ================= CONFIG =================

const client_id = "80ab7bcad7fa42ca845867919fbacfd5";
const redirect_uri = "https://harty551655.github.io/spotify-guessing-game/";

// ==========================================

const scope = "playlist-read-private";

let access_token = "";
let songs = [];
let currentSong = null;
let score = 0;
let lives = 3;

// ================= PKCE =================

function generateRandomString(length) {
  const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
  let result = "";
  for (let i = 0; i < length; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

async function sha256(plain) {
  const encoder = new TextEncoder();
  const data = encoder.encode(plain);
  return await crypto.subtle.digest("SHA-256", data);
}

function base64encode(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, "-")
    .replace(/\//g, "_")
    .replace(/=+$/, "");
}

// ================= LOGIN =================

document.getElementById("loginBtn").onclick = async () => {
  const verifier = generateRandomString(128);
  localStorage.setItem("verifier", verifier);

  const hashed = await sha256(verifier);
  const challenge = base64encode(hashed);

  const url =
    "https://accounts.spotify.com/authorize?" +
    "client_id=" + client_id +
    "&response_type=code" +
    "&redirect_uri=" + encodeURIComponent(redirect_uri) +
    "&scope=" + encodeURIComponent(scope) +
    "&code_challenge_method=S256" +
    "&code_challenge=" + challenge;

  window.location = url;
};

// ================= HANDLE REDIRECT =================

window.onload = async () => {
  const params = new URLSearchParams(window.location.search);
  const code = params.get("code");

  if (!code) return;

  console.log("Code:", code);

  const verifier = localStorage.getItem("verifier");

  const body = new URLSearchParams({
    client_id: client_id,
    grant_type: "authorization_code",
    code: code,
    redirect_uri: redirect_uri,
    code_verifier: verifier
  });

  const res = await fetch("https://accounts.spotify.com/api/token", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: body
  });

  const data = await res.json();
  console.log("Token:", data);

  if (!data.access_token) {
    alert("Login failed — check console");
    return;
  }

  access_token = data.access_token;

  document.getElementById("loginDiv").style.display = "none";
  document.getElementById("game").style.display = "block";

  loadPlaylists();

  // Clean URL
  window.history.replaceState({}, document.title, redirect_uri);
};

// ================= PLAYLISTS =================

async function loadPlaylists() {
  const res = await fetch("https://api.spotify.com/v1/me/playlists", {
    headers: { Authorization: "Bearer " + access_token }
  });

  const data = await res.json();
  const select = document.getElementById("playlistSelect");

  select.innerHTML = "";

  data.items.forEach(p => {
    const opt = document.createElement("option");
    opt.value = p.id;
    opt.text = p.name;
    select.appendChild(opt);
  });

  select.onchange = async () => {
    await loadSongs(select.value);
    playRandom();
  };
}

// ================= SONGS =================

async function loadSongs(id) {
  const res = await fetch(`https://api.spotify.com/v1/playlists/${id}/tracks`, {
    headers: { Authorization: "Bearer " + access_token }
  });

  const data = await res.json();

  songs = data.items
    .map(i => i.track)
    .filter(t => t && t.preview_url)
    .map(t => ({
      name: t.name.toLowerCase(),
      preview: t.preview_url
    }));
}

// ================= GAME =================

function playRandom() {
  if (lives <= 0) {
    alert("Game Over");
    return;
  }

  currentSong = songs[Math.floor(Math.random() * songs.length)];
  const audio = document.getElementById("audio");

  audio.src = currentSong.preview;
  audio.play();
}

document.getElementById("guessBtn").onclick = () => {
  const guess = document.getElementById("guessInput").value.toLowerCase();

  if (guess === currentSong.name) {
    score++;
  } else {
    lives--;
  }

  document.getElementById("score").innerText =
    `Score: ${score} | Lives: ${lives}`;

  playRandom();
};

</script>

</body>
</html>
